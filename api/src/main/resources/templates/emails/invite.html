<!DOCTYPE html>
<html lang="{lang}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IdeaCamp</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f5f7; font-family: Arial, Helvetica, sans-serif; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #4f46e5; padding: 28px 32px; }
    .header h1 { margin: 0; color: #ffffff; font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .body { padding: 32px; color: #1a1d24; font-size: 15px; line-height: 1.6; }
    .greeting { margin: 0 0 16px; }
    .main-text { margin: 0 0 24px; }
    .message-box { background: #f4f5f7; border-left: 3px solid #4f46e5; border-radius: 4px; padding: 12px 16px; margin: 0 0 28px; font-style: italic; color: #4b5563; font-size: 14px; }
    .cta-wrap { text-align: center; margin: 0 0 28px; }
    .cta-btn { display: inline-block; background: #4f46e5; color: #ffffff; text-decoration: none; padding: 12px 28px; border-radius: 6px; font-size: 15px; font-weight: 600; }
    .hint { font-size: 13px; color: #6b7280; margin: 0 0 24px; }
    .footer { border-top: 1px solid #e5e7eb; padding: 20px 32px; background: #f9fafb; font-size: 12px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>IdeaCamp</h1>
    </div>
    <div class="body">
      <p class="greeting">{greeting}</p>
      <p class="main-text">{body}</p>
      {message-block}
      <div class="cta-wrap">
        <a class="cta-btn" href="{ctaUrl}">{cta}</a>
      </div>
      <p class="hint">{hint}</p>
    </div>
    <div class="footer">{footer}</div>
  </div>
</body>
</html>

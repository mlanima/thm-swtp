<!doctype html>
<html lang="{lang}">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            padding: 24px;
        }

        .card {
            max-width: 560px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 18px;
            background: #84cc16;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .hint {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>{greeting}</h2>
    <p>{body}</p>

    <a class="button" href="{verificationUrl}">{cta}</a>

    <p class="hint">{hint}</p>
    <p class="hint">{footer}</p>
</div>
</body>
</html>

<div class="login-wrapper">
  <div class="login-container">

    <h1 class="login-title">Login</h1>

    <p class="login-subtitle">
      Welcome back! Please enter your credentials to continue.
    </p>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label>Email or Username</label>

        <input
          type="text"
          name="emailOrUsername"
          [(ngModel)]="emailOrName"
          #emailInput="ngModel"
          required
          placeholder="Enter your email or username"
        />

        <small
          class="error"
          *ngIf="submitted && emailInput.invalid"
        >
          Email or Username is required.
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>

        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          #passwordInput="ngModel"
          required
          placeholder="Enter your password"
        />

        <small
          class="error"
          *ngIf="submitted && passwordInput.invalid"
        >
          Password is required.
        </small>
      </div>

      <div class="options">

        <label class="remember">
          <input type="checkbox" />
          <span>Remember me</span>
        </label>

        <a href="#" class="forgot-password">
          Forgot password?
        </a>

      </div>

      <button *ngIf="!loading" type="submit" class="login-btn">
        Login
      </button>

      <button *ngIf="loading" type="button" class="login-btn flex items-center justify-center gap-3 opacity-80" disabled>
        <div class="w-5 h-5 rounded-full border-2 border-white/30 border-t-white animate-spin">
        </div>
        Loading...
      </button>

    </form>

    <div class="divider"></div>

    <p class="signup-text">
      Don't have an account?
      <a href="#">Sign up here</a>
    </p>

  </div>
</div>

<div class="min-h-screen bg-slate-100 px-8 py-10">

  <main class="mx-auto max-w-5xl">

    <header class="mb-8">
      <h1 class="text-3xl font-bold text-slate-700">
        Contact request
      </h1>

      <p class="mt-3 text-sm text-slate-500">
        Manage contact requests of your projects
      </p>
    </header>

    <section>
      <h2 class="mb-5 text-2xl font-bold text-slate-700">
        Open Requests ({{ openRequests.length }})
      </h2>

      <div class="flex flex-col gap-6">
        @for (request of openRequests; track request.id) {
          <app-contact-request-box
            [request]="request">
          </app-contact-request-box>
        }
      </div>
    </section>

    <section class="mt-12">
      <h2 class="mb-5 text-2xl font-bold text-slate-700">
        Proceeded Requests ({{ processedRequests.length }})
      </h2>

      <div class="flex flex-col gap-6">
        @for (request of processedRequests; track request.id) {
          <app-contact-request-box
            [request]="request">
          </app-contact-request-box>
        }
      </div>
    </section>

  </main>

</div>

<div class="min-h-screen bg-slate-100 text-slate-700">
  <div class="mx-auto w-full max-w-6xl px-6 py-6">

    <h1 class="mb-4 text-2xl font-bold text-slate-700">Einstellungen</h1>

    <div class="flex flex-col gap-4 md:flex-row md:gap-10">

      <aside class="w-full md:w-48 md:shrink-0">
        <nav class="space-y-0.5">
          @for (tab of tabs; track tab.id) {
            <button
              (click)="setTab(tab.id)"
              class="flex w-full cursor-pointer items-center gap-2.5 rounded-lg px-3 py-2 text-sm transition-colors"
              [ngClass]="activeTab() === tab.id
                ? 'bg-slate-800 text-white'
                : 'text-slate-600 hover:bg-slate-200 hover:text-slate-800'"
            >
              <i class="pi text-sm" [ngClass]="tab.icon"></i>
              {{ tab.label }}
            </button>
          }
        </nav>
      </aside>

      <main class="flex-1 min-w-0">
        @if (activeTab() === 'professor-request') {
          <app-professor-request-tab />
        }
        @if (activeTab() === 'contact') {
          <app-contact-tab />
        }
        @if (activeTab() === 'impressum') {
          <app-impressum-tab />
        }
      </main>

    </div>
  </div>
</div>

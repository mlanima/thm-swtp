<a
  [routerLink]="['/project', project.projectUrl]"
  class="flex cursor-pointer items-start gap-4 rounded-xl border border-slate-200 bg-white p-5 text-left shadow-sm transition hover:border-green-300 hover:shadow-md"
>
  <div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-slate-200 text-sm font-bold text-slate-600">
    {{ initials }}
  </div>

  <div>
    <h3 class="text-lg font-semibold text-slate-700">
      {{ project.name }}
    </h3>

    <span class="mt-1 inline-block rounded-full bg-green-100 px-3 py-1 text-xs font-medium text-green-700">
      Project
    </span>

    @if (project.description) {
      <p class="mt-3 text-sm text-slate-500">
        {{ project.description }}
      </p>
    }
  </div>
</a>

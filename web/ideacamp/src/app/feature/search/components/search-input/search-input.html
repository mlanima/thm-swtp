<div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <!-- Tags area above input -->
  <div class="mb-4 flex flex-wrap gap-2">
    @if (queries().length === 0) {
      <button
        (click)="focusInput()"
        class="flex items-center rounded-lg border border-dashed border-slate-300 px-3 py-1.5 text-sm text-slate-500 hover:border-slate-400 hover:text-slate-600 transition"
      >
        <svg class="mr-1.5 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add search input
      </button>
    }

    @for (query of queries(); track query) {
      <span
        class="flex items-center rounded-lg bg-[#4a5c66] px-3 py-1.5 text-sm text-white border border-transparent"
        [class.tag-adding]="addingQueries().has(query)"
        [class.tag-removing]="removingQueries().has(query)"
      >
        {{ query }}
        <button (click)="removeQuery(query)" class="ml-2 text-slate-300 hover:text-white focus:outline-none">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </span>
    }
  </div>

  <!-- Search input field -->
  <div
    class="flex items-center rounded-lg border border-slate-200 bg-white px-4 py-3 transition focus-within:border-green-500 focus-within:ring-1 focus-within:ring-green-500"
  >
    <svg class="mr-3 h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35m0 0A7.5 7.5 0 1 0 6 6a7.5 7.5 0 0 0 10.65 10.65Z" />
    </svg>
    <input
      #searchInput
      type="text"
      [(ngModel)]="inputValue"
      (input)="onInputChange()"
      (keydown)="onKeyDown($event)"
      placeholder="Search for users or projects..."
      class="w-full bg-transparent text-sm text-slate-700 outline-none placeholder:text-slate-400"
    />
  </div>

  <!-- Popular tags below input -->
  <div class="mt-5 flex flex-wrap gap-2">
    @for (tag of popularTags; track tag) {
      <button
        (click)="addQuery(tag)"
        class="rounded-xl bg-slate-50 px-3 py-1.5 text-sm text-slate-600 transition hover:bg-slate-100 border border-slate-100"
      >
        {{ tag }}
      </button>
    }
  </div>
</div>

<article class="flex items-start gap-4 rounded-xl border border-slate-200 bg-white p-5 shadow-sm transition hover:shadow-md">
  <div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-slate-200 text-sm font-bold text-slate-600">
    {{ initials }}
  </div>

  <div>
    <h3 class="text-lg font-semibold text-slate-700">
      {{ user().username }}
    </h3>

    @if (user().title) {
      <span class="mt-1 inline-block rounded-full bg-blue-100 px-3 py-1 text-xs font-medium text-blue-700">
        {{ user().title }}
      </span>
    }

    @if (user().location) {
      <p class="mt-3 flex items-center gap-1 text-sm text-slate-500">
        <svg class="h-4 w-4 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z" />
        </svg>
        {{ user().location }}
      </p>
    }
  </div>
</article>

<div class="rounded-2xl bg-white p-5 shadow-sm">
  <h3 class="mb-4 text-sm font-semibold text-slate-700">
    Tags
  </h3>

  @if (isLoading()) {
    <p class="text-xs text-slate-500">Tags werden geladen…</p>
  }

  @if (!isLoading() && errorMessage()) {
    <p class="text-xs text-red-600">{{ errorMessage() }}</p>
  }

  <div class="flex flex-wrap gap-2">
    @for (tag of tags(); track tag.name) {
      <span class="rounded-md bg-slate-600 px-3 py-1 text-xs text-white">
        {{ tag.name }}
      </span>
    }

    @if (isOwner) {
      @if (isAdding()) {
        <input
          #tagInput
          [ngModel]="newTagName()"
          (ngModelChange)="newTagName.set($event)"
          (keyup.enter)="saveTag()"
          (keyup.escape)="cancelAdd()"
          (blur)="saveTag()"
          [disabled]="isSaving()"
          placeholder="Neuer Tag"
          class="w-28 rounded-md border border-dashed border-slate-300 px-3 py-1 text-xs text-slate-700 placeholder:text-slate-400 focus:border-lime-400 focus:outline-none disabled:bg-slate-100"
        />
      } @else {
        <button
          type="button"
          (click)="startAdd()"
          class="rounded-md border border-dashed border-slate-300 px-3 py-1 text-xs font-semibold text-slate-500 hover:border-lime-400 hover:text-lime-600"
          aria-label="Tag hinzufügen"
        >
          +
        </button>
      }
    }
  </div>
</div>

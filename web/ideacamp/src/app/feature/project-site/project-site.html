<div class="min-h-screen bg-slate-100 text-slate-700">

  @if (isLoading()) {
    <div class="flex items-center justify-center py-20">
      <p class="text-slate-500">Projekt wird geladen…</p>
    </div>
  }

  @if (!isLoading() && errorMessage()) {
    <div class="mx-auto max-w-6xl px-6 py-10">
      <div class="rounded-xl bg-red-50 border border-red-200 p-6 text-red-700">
        <p class="font-semibold">Fehler</p>
        <p class="mt-1 text-sm">{{ errorMessage() }}</p>
      </div>
    </div>
  }

  @if (successMessage()) {
    <div class="mx-auto max-w-6xl px-6 pt-6">
      <div class="rounded-xl bg-green-50 border border-green-200 p-4 text-green-700 text-sm">
        {{ successMessage() }}
      </div>
    </div>
  }

  @if (!isLoading() && project()) {
    <app-project-header [project]="project()!" [isOwner]="isOwner" />

    <main class="mx-auto grid max-w-6xl grid-cols-1 gap-6 px-6 py-10 lg:grid-cols-[1fr_320px]">
      <section class="space-y-6">

        <div class="rounded-2xl bg-white p-6 shadow-sm">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold text-slate-700">
              <span class="text-lime-500">•</span>
              About the Project
            </h2>

            @if (isOwner) {

            }

            @if (isOwner) {
              <div class="flex items-center gap-3">
                <a
                  [routerLink]="['/project', project()!.projectUrl, 'settings']"
                  class="flex items-center gap-2 rounded-md px-3 py-2 text-sm text-slate-500 transition hover:bg-slate-100 hover:text-lime-500"
                >
                  <i class="pi pi-cog text-md text-zinc-400"></i>
                </a>

                <button (click)="startEdit()" class="cursor-pointer text-slate-400 hover:text-lime-500">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10.0002 4H7.2002C6.08009 4 5.51962 4 5.0918 4.21799C4.71547 4.40973 4.40973 4.71547 4.21799 5.0918C4 5.51962 4 6.08009 4 7.2002V16.8002C4 17.9203 4 18.4801 4.21799 18.9079C4.40973 19.2842 4.71547 19.5905 5.0918 19.7822C5.5192 20 6.07899 20 7.19691 20H16.8031C17.921 20 18.48 20 18.9074 19.7822C19.2837 19.5905 19.5905 19.2839 19.7822 18.9076C20 18.4802 20 17.921 20 16.8031V14M16 5L10 11V14H13L19 8M16 5L19 2L22 5L19 8M16 5L19 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            }
          </div>

          @if (isEditing()) {
            <div class="space-y-4">
              <div>
                <label for="editName" class="text-xs font-medium text-slate-500">Projektname</label>
                <input
                  id="editName"
                  [ngModel]="editName()"
                  (ngModelChange)="editName.set($event)"
                  class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 focus:border-lime-400 focus:outline-none"
                />
              </div>
              <div>
                <label for="editDescription" class="text-xs font-medium text-slate-500">Beschreibung</label>
                <textarea
                  id="editDescription"
                  [ngModel]="editDescription()"
                  (ngModelChange)="editDescription.set($event)"
                  rows="4"
                  class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 focus:border-lime-400 focus:outline-none"
                ></textarea>
              </div>
              <div class="flex gap-2">
                <button
                  (click)="saveEdit()"
                  [disabled]="isSaving()"
                  class="rounded-md bg-lime-500 px-4 py-2 text-sm font-medium text-white hover:bg-lime-600 disabled:opacity-50"
                >
                  {{ isSaving() ? 'Speichern…' : 'Speichern' }}
                </button>
                <button
                  (click)="cancelEdit()"
                  class="rounded-md bg-slate-200 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-300"
                >
                  Abbrechen
                </button>
              </div>
            </div>
          } @else {
            <app-info-card [project]="project()!" />
          }
        </div>
<!--        TODO: not implemented yet-->
<!--        <app-open-position-card />-->
      </section>

      <app-sidebar [projectId]="project()!.id" [isOwner]="isOwner" />
    </main>
  }

</div>

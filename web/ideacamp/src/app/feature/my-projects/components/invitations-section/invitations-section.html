<div class="mt-8 rounded-xl border border-slate-200 bg-white shadow-sm">
  @if (invitations().length > 0) {
    <button
      (click)="toggle()"
      class="flex w-full items-center justify-between px-6 py-4 text-left"
    >
      <div class="flex items-center gap-3">
        <span class="text-base font-semibold text-slate-700">Projekteinladungen</span>
        <span
          class="flex h-6 w-6 items-center justify-center rounded-full bg-slate-800 text-xs font-medium text-white"
          >{{ invitations().length }}</span
        >
      </div>
      <i
        class="pi text-slate-400"
        [class]="invitationsExpanded() ? 'pi-chevron-up' : 'pi-chevron-down'"
      ></i>
    </button>

    <div class="collapsible-content px-6" [class.expanded]="invitationsExpanded()" [class.border-t]="invitationsExpanded()" [class.border-slate-100]="invitationsExpanded()">
      <div class="py-4">
        @for (invite of invitations(); track invite.id) {
          <div [class.mt-3]="!$first" class="invitation-item" [style.transition-delay]="$index * 0.05 + 's'">
            <app-invitation-card
              [invite]="invite"
              (accept)="accept($event)"
              (decline)="decline($event)"
            />
          </div>
        }
      </div>
    </div>
  } @else {
    <div class="flex w-full items-center justify-between px-6 py-4">
      <div class="flex items-center gap-3">
        <span class="text-base font-semibold text-slate-700">Projekteinladungen</span>
        <span
          class="flex h-6 w-6 items-center justify-center rounded-full bg-slate-800 text-xs font-medium text-white"
          >0</span
        >
      </div>
    </div>
  }
</div>

@if (errorMessage()) {
  <div
    class="mt-2 rounded-xl border border-red-200 bg-red-50 px-6 py-3 text-center shadow-sm"
  >
    <p class="text-sm font-medium text-red-700">{{ errorMessage() }}</p>
  </div>
}

<div class="rounded-xl border border-slate-100 p-5">
  <div class="flex items-start gap-4">
    <div
      class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full text-sm font-bold text-white"
      [class]="getAvatarColor(invite().projectName)"
    >
      {{ getInitials(invite().projectName) }}
    </div>
    <div class="flex-1">
      <h3 class="text-base font-semibold text-slate-700">{{ invite().projectName }}</h3>
      <p class="mt-0.5 text-sm text-slate-400">
        {{ 'MYPROJECTS.INVITED_BY' | translate }}
        <span class="font-medium text-slate-600">{{ invite().invitedByUsername }}</span>
        · {{ timeAgo(invite().createdAt) }}
      </p>
      @if (invite().message) {
        <blockquote class="mt-3 border-l-4 border-slate-200 pl-4 text-sm text-slate-500">
          {{ invite().message }}
        </blockquote>
      }
      <div class="mt-4 flex gap-2">
        <button
          (click)="accept.emit(invite())"
          class="inline-flex items-center gap-1.5 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700"
        >
          <i class="pi pi-check text-xs"></i> {{ 'MYPROJECTS.ACCEPT' | translate }}
        </button>
        <button
          (click)="decline.emit(invite())"
          class="inline-flex items-center gap-1.5 rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-50"
        >
          <i class="pi pi-times text-xs"></i> {{ 'MYPROJECTS.DECLINE' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>

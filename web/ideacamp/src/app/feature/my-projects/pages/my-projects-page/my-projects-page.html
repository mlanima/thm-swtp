<section class="min-h-screen bg-slate-100 px-6 py-8 text-slate-700">
  <div class="mx-auto max-w-6xl">
    <header class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
      <h1 class="text-4xl font-bold text-slate-700">Meine Projekte</h1>
      <a
        routerLink="/createProject"
        class="inline-flex items-center justify-center rounded-lg bg-slate-800 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-900"
      >
        Projekt erstellen
      </a>
    </header>

    <app-invitations-section />

    <div class="mt-8">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h2 class="text-2xl font-bold text-slate-700">Projekte</h2>
          <p class="text-sm text-slate-400">
            {{ projects().length }}
            {{ activeFilter() === 'my' ? 'Projekte im Besitz' : 'Projekte' }}
          </p>
        </div>
        <app-project-filter
          [activeFilter]="activeFilter()"
          (filterChange)="setFilter($event)"
        />
      </div>

      <app-project-list
        [projects]="projects()"
        [projectTags]="projectTags()"
        [isLoading]="isLoading()"
        [isFiltering]="isFiltering()"
        [errorMessage]="errorMessage()"
      />
    </div>
  </div>
</section>

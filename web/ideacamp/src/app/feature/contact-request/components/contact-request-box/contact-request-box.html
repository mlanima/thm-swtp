<article class="rounded-lg bg-white p-6 shadow-sm">

  <div class="mb-4 flex items-start justify-between gap-4">

    <div>
      <div class="flex items-center gap-2">
        <h3 class="text-lg font-bold text-slate-700">
          {{ request.senderName }}
        </h3>

        <span
          class="rounded-full px-2.5 py-1 text-xs font-semibold"
          [class]="switchStatusStyle">
          {{ request.status }}
        </span>
      </div>

      <p class="mt-1 text-sm text-slate-500">
        {{ 'COMMON.PROJECT' | translate }}: {{ request.projectName }}
      </p>
    </div>

    <span class="text-xs text-slate-500">
      {{ request.date }}
    </span>

  </div>

  <p class="break-all text-sm leading-6 text-slate-600">
    {{ request.message }}
  </p>

  @if (openRequest) {
    <div class="mt-5 flex gap-3">
      <button
        type="button"
        (click)="accept.emit(request.id)"
        class="rounded-lg border bg-lime-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-lime-700">
        ✓ {{ 'MYPROJECTS.ACCEPT' | translate }}
      </button>

      <button
        type="button"
        (click)="reject.emit(request.id)"
        class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-red-800 hover:text-white">
        × {{ 'MYPROJECTS.DECLINE' | translate }}
      </button>
    </div>
  }
</article>

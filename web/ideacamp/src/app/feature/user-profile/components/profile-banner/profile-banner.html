<section class="rounded-xl bg-white p-6 shadow-lg">
  <div class ="flex items-center gap-6">

    <div class ="flex h-28 w-28 items-center justify-center rounded-full bg-slate-200 text-4xl font-bold text-slate-500">
      {{dummy.initials}}
    </div>

    <div class="flex-1">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold text-slate-800">
            {{dummy.username}}
          </h1>

          @if (dummy.title) {
            <p class="mt-2 text-sm text-slate-700">
              {{dummy.title}}
            </p>
          }

          <div class="mt-3 flex items-center gap-5 text-sm text-slate-500">
            <div class="flex items-center gap-1.5">
              <app-location-icon></app-location-icon>
              <span> {{dummy.location}}</span>
            </div>

            <div class="flex items-center gap-1.5">
              <app-followers-icon></app-followers-icon>
              <span> {{dummy.followers}} Followers </span>
            </div>
          </div>
        </div>

        <div class="flex gap-3">
          <button type="button"
                  class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-700 hover:text-white">
            Follow
          </button>

          <button type="button" class="rounded-lg border bg-slate-700 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-800">
            Invite
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<app-editable-tag-list
  [title]="'TAGS.TITLE' | translate"
  [tags]="tags()"
  [isOwner]="isOwner"
  [isLoading]="isLoading()"
  [isSaving]="isSaving()"
  [isDeleting]="isDeleting()"
  [errorMessage]="errorMessage()"
  (addTag)="saveTag($event)"
  (deleteTag)="deleteTag($event)">
</app-editable-tag-list>

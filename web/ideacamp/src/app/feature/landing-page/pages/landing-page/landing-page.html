<section class="relative h-screen overflow-hidden">
  <img
    src="teamwork.png"
    alt="Team working together around a table"
    class="absolute inset-0 h-full w-full object-cover"
  />

  <div class="absolute inset-0 bg-gradient-to-b from-slate-900/20 via-slate-900/50 to-slate-900/85"></div>

  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_rgba(128,186,36,0.12),_transparent_50%)]"></div>

  <div class="relative z-10 flex h-full items-center">
    <div class="container mx-auto px-6 md:px-12">
      <div class="flex flex-col md:flex-row md:justify-between md:gap-24 lg:gap-40">
        <div class="animate-fade-in-up">
          <h1 class="text-5xl font-bold leading-tight text-balance md:text-7xl text-white whitespace-pre-line">
            {{ 'LANDING.H1' | translate }}
          </h1>

          <p class="mt-6 max-w-lg text-lg leading-relaxed text-white/80">
            {{ 'LANDING.P' | translate }}
          </p>
        </div>

        <div class="animate-fade-in-up animation-delay-200 flex flex-1 flex-col items-center justify-center">
          <ul class="space-y-4">
            <li class="flex items-start gap-4">
              <span class="flex size-9 shrink-0 items-center justify-center rounded-lg bg-primary/20 text-primary">
                <i class="pi pi-star text-sm"></i>
              </span>
              <span class="text-white/85 text-base leading-relaxed pt-1">
                {{ 'LANDING.FEATURE_SHARE' | translate }}
              </span>
            </li>
            <li class="flex items-start gap-4">
              <span class="flex size-9 shrink-0 items-center justify-center rounded-lg bg-primary/20 text-primary">
                <i class="pi pi-users text-sm"></i>
              </span>
              <span class="text-white/85 text-base leading-relaxed pt-1">
                {{ 'LANDING.FEATURE_TEAM' | translate }}
              </span>
            </li>
            <li class="flex items-start gap-4">
              <span class="flex size-9 shrink-0 items-center justify-center rounded-lg bg-primary/20 text-primary">
                <i class="pi pi-send text-sm"></i>
              </span>
              <span class="text-white/85 text-base leading-relaxed pt-1">
                {{ 'LANDING.FEATURE_LAUNCH' | translate }}
              </span>
            </li>
          </ul>

          <button
            (click)="auth.login()"
            class="group mt-10 inline-flex items-center gap-3 rounded-xl bg-primary px-8 py-4 text-base font-semibold text-white shadow-xl shadow-primary/25 transform-gpu transition-all duration-300 ease-out hover:scale-[1.03] hover:bg-primary-dark hover:shadow-primary/40 active:scale-[0.98] animate-fade-in-up animation-delay-400"
          >
            {{ 'LANDING.BUTTON' | translate }}
            <i class="pi pi-arrow-right text-sm transition-transform duration-300 group-hover:translate-x-1"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

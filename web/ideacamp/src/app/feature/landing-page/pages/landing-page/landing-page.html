<section class="relative h-[calc(100vh-59px)] overflow-hidden">
  <img
    src="teamwork.png"
    alt="Team working together around a table"
    class="absolute inset-0 h-full w-full object-cover"
  />

  <div class="absolute inset-0 bg-slate-900/65"></div>

  <div class="relative z-10 flex h-full items-center justify-center">
    <div class="text-white container w-full">
      <h1 class="text-5xl font-bold leading-tight md:text-6xl whitespace-pre-line">
        {{ 'LANDING.H1' | translate }}
      </h1>

      <p class="mt-5 max-w-md text-sm leading-6 text-white/90">
        {{ 'LANDING.P' | translate }}
      </p>

      <button
        (click)="authService.login()"
        class="mt-8 max-w-md rounded-2xl bg-slate-900/75 p-5 text-base leading-7 text-white shadow-lg backdrop-blur-sm transform-gpu transition-all duration-500 ease-out hover:scale-[1.02] hover:bg-slate-800/80"
      >
        {{ 'LANDING.BUTTON' | translate }}
      </button>
    </div>
  </div>
</section>

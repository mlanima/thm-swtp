<section class="relative h-screen overflow-hidden">
  <img
    src="teamwork.png"
    alt="Team working together around a table"
    class="absolute inset-0 h-full w-full object-cover"
  />

  <div class="absolute inset-0 bg-gradient-to-b from-slate-900/20 via-slate-900/50 to-slate-900/85"></div>

  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_rgba(128,186,36,0.12),_transparent_50%)]"></div>

  <div class="relative z-10 flex h-full items-center justify-center">
    <div class="container mx-auto px-6 md:px-12">
      <div class="mx-auto flex max-w-4xl flex-col items-center text-center">
        <div class="animate-fade-in-up">
          <h1 class="whitespace-pre-line text-balance text-5xl font-bold leading-tight text-white md:text-7xl">
            {{ 'LANDING.H1' | translate }}
          </h1>

          <p class="mx-auto mt-6 max-w-2xl text-lg leading-relaxed text-white/80">
            {{ 'LANDING.P' | translate }}
          </p>
        </div>

        <button
          (click)="auth.login()"
          class="group mt-10 flex w-full max-w-md items-center justify-center gap-3 rounded-xl bg-primary px-8 py-4 text-base font-semibold text-white shadow-xl shadow-primary/25 transform-gpu transition-all duration-300 ease-out hover:scale-[1.03] hover:bg-primary-dark hover:shadow-primary/40 active:scale-[0.98] animate-fade-in-up animation-delay-200"
        >
          {{ 'LANDING.BUTTON' | translate }}
          <i class="pi pi-arrow-right text-sm transition-transform duration-300 group-hover:translate-x-1"></i>
        </button>
      </div>
    </div>
  </div>
</section>

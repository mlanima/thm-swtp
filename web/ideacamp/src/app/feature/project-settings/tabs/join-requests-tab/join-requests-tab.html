<div>
  <h1 class="text-2xl font-semibold text-slate-800">Beitrittsanfragen</h1>
  <p class="mt-1 text-sm text-slate-500">Beitrittsanfragen für dieses Projekt bearbeiten.</p>

  <div class="mt-6 space-y-3">
    @for (req of requests(); track req.id) {
      <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="flex items-start justify-between gap-4">
          <div class="flex items-center gap-3">
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full text-xs font-semibold text-white"
                 [ngClass]="req.avatarColor">
              {{ req.initials }}
            </div>
            <div>
              <p class="text-sm font-semibold text-slate-800">{{ req.name }}</p>
              <p class="text-xs text-slate-400">{{ req.email }}</p>
            </div>
          </div>
          <span class="shrink-0 text-xs text-slate-400">{{ req.requestDate }}</span>
        </div>

        <p class="mt-3 text-sm italic text-slate-500">{{ req.message }}</p>

        <div class="mt-3 flex items-center gap-2">
          <button
            (click)="approve(req.id)"
            class="flex cursor-pointer items-center gap-1.5 rounded-md bg-slate-800 px-3 py-1.5 text-xs font-medium text-white hover:bg-slate-700"
          >
            <i class="pi pi-check text-xs"></i>
            Approve
          </button>
          <button
            (click)="decline(req.id)"
            class="flex cursor-pointer items-center gap-1.5 rounded-md border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-50"
          >
            <i class="pi pi-times text-xs"></i>
            Decline
          </button>
        </div>
      </div>
    }

    @if (requests().length === 0) {
      <div class="rounded-xl border border-slate-200 bg-white p-8 text-center text-sm text-slate-400">
        No pending join requests.
      </div>
    }
  </div>
</div>

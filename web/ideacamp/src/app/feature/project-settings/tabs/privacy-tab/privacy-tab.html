<div>
  <h1 class="text-2xl font-semibold text-slate-800">Privacy</h1>
  <p class="mt-1 text-sm text-slate-500">Steuern der Sichtbarkeit und Beitritt des Projekts</p>

  <div class="mt-6 rounded-xl border border-slate-200 bg-white shadow-sm divide-y divide-slate-100">

    <div class="flex items-center justify-between px-5 py-4">
      <div>
        <p class="text-sm font-medium text-slate-800">Öffentliche Sichtbarkeit</p>
        <p class="mt-0.5 text-xs text-slate-500">Dieses Projekt ist öffentlich sichtbar und kann von jedem gefunden werden.</p>
      </div>
      <label class="relative inline-flex cursor-pointer items-center">
        <input
          type="checkbox"
          class="peer sr-only"
          [checked]="isPublic()"
          (change)="isPublic.set(!isPublic())"
        />
        <div class="relative h-6 w-11 rounded-full bg-slate-200 transition-colors
                    peer-checked:bg-slate-700
                    after:absolute after:left-[2px] after:top-[2px]
                    after:h-5 after:w-5 after:rounded-full after:bg-white
                    after:transition-all after:content-['']
                    peer-checked:after:translate-x-full">
        </div>
      </label>
    </div>

    <div class="flex items-center justify-between px-5 py-4">
      <div>
        <p class="text-sm font-medium text-slate-800">Beitrittsanfragen zulassen</p>
        <p class="mt-0.5 text-xs text-slate-500">Nutzer können beantragen, dem Projekt beizutreten.Akzeptieren und Ablehnen durch Projektinhaber möglich</p>
      </div>
      <label class="relative inline-flex cursor-pointer items-center">
        <input
          type="checkbox"
          class="peer sr-only"
          [checked]="joinRequestsAllowed()"
          (change)="toggleAllowJoinRequests()"
        />
        <div class="relative h-6 w-11 rounded-full bg-slate-200 transition-colors
                    peer-checked:bg-slate-700
                    after:absolute after:left-[2px] after:top-[2px]
                    after:h-5 after:w-5 after:rounded-full after:bg-white
                    after:transition-all after:content-['']
                    peer-checked:after:translate-x-full">
        </div>
      </label>
    </div>

  </div>
</div>

<form class="space-y-6">

  <div>
    <label for="project-url" class="mb-1 block text-sm font-medium text-slate-700">
      Project-URL
    </label>

    <input
      id="project-url"
      type="text"
      name="projectUrl"
      [(ngModel)]="formData.projectUrl"
      placeholder="project-url"
      class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none"
      [class.border-red-500]="errors.projectUrl"
      [class.border-slate-300]="!errors.projectUrl"
      [class.focus:border-lime-500]="!errors.projectUrl">


    @if (errors.projectUrl){
      <p class ="mt-1 text-sm text-red-600">
        {{errors.projectUrl}}
      </p>
    }
  </div>

  <div class="flex items-center justify-between rounded-lg bg-slate-50 p-4">

    <div>
      <h3 class="text-sm font-bold text-slate-800">
        Private
      </h3>

      <p class="mt-1 text-xs text-slate-500">
        Only invited people can see this project
      </p>
    </div>

    <button
      type="button"
      (click)="togglePrivateProject()"
      class="flex h-6 w-12 items-center rounded-full p-1 transition"
      [class.bg-lime-500]="formData.isPrivateProject"
      [class.bg-slate-600]="!formData.isPrivateProject">

      <span
        class="h-4 w-4 rounded-full bg-white transition"
        [class.translate-x-6]="formData.isPrivateProject">
      </span>
    </button>

  </div>

  <div class="flex items-center justify-between border-t border-slate-200 pt-6">

    <button
      type="button"
      (click)="goBack()"
      class="text-sm text-slate-500 hover:text-slate-800">
      Back
    </button>

    <button
      type="button"
      (click)="submit()"
      class="rounded-lg bg-lime-500 px-5 py-2 text-sm font-semibold text-white hover:bg-lime-600">
      Next
    </button>

  </div>

</form>

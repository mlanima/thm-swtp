<div class="min-h-screen bg-gray-50">


  <header class="h-16 border-b border-gray-200 bg-white shadow-sm">
    <ng-content select="[header]"></ng-content>
  </header>


  <main class="px-4 py-12 sm:px-8">

    <h1 class="mb-10 text-center text-3xl font-bold text-slate-800">
      Erstelle ein neues Projekt
    </h1>

    <div class="mx-auto flex max-w-5xl flex-col items-stretch justify-center gap-8 md:flex-row md:items-start">


      <aside class="w-full rounded-xl bg-white p-6 shadow-md md:w-60">
        <ng-content select="[sidebar]"></ng-content>
      </aside>


      <section class="w-full rounded-xl bg-white p-8 shadow-md md:w-155">
        <ng-content></ng-content>
      </section>

    </div>

  </main>

</div>

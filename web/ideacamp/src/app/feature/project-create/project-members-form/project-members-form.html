<form class="space-y-6">

  <div>
    <label class="mb-3 block text-sm font-medium text-slate-700">
      Project members
    </label>

    <div class="space-y-3">



      <button
        type="button"
        class="flex w-full items-center justify-center rounded-lg border border-dashed border-slate-700 px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50">
        + Add member
      </button>

    </div>
  </div>

  <div class="flex items-center justify-between border-t border-slate-200 pt-6">

    <button
      type="button"
      (click)="back.emit()"
      class="text-sm text-slate-500 hover:text-slate-800">
      Back
    </button>

    <button
      type="button"
      (click)="next.emit()"
      class="rounded-lg bg-lime-500 px-5 py-2 text-sm font-semibold text-white hover:bg-lime-600">
      Next
    </button>

  </div>

</form>

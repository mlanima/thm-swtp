<form class="space-y-5">

  <div>
    <label for="project-name" class="mb-1 block text-sm font-medium text-gray-700">
      Projektname
    </label>

    <input
      id="project-name"
      type="text"
      name = "name"
      [(ngModel)]="formData.name"
      placeholder="Gib den Projektnamen ein"
      class="w-full rounded-lg border px-3 py-2 outline-none"
      [class.border-red-500]="errors.name"
      [class.border-gray-300]="!errors.name"
      [class.focus:border-lime-500]="!errors.name"
    >

    @if(errors.name){
      <p class="mt-1 text-sm text-red-600">
        {{errors.name}}
      </p>
    }
  </div>

  <div>
    <label for="project-short-description" class="mb-1 block text-sm font-medium text-gray-700">
      Kurzbeschreibung
    </label>

    <input
      id="project-short-description"
      type="text"
      name="shortDescription"
      [(ngModel)]="formData.shortDescription"
      placeholder="Beschreibe dein Projekt in ein bis zwei Sätzen"
      maxlength="300"
      class="w-full rounded-lg border px-3 py-2 outline-none"
      [class.border-red-500]="errors.shortDescription"
      [class.border-gray-300]="!errors.shortDescription"
      [class.focus:border-lime-500]="!errors.shortDescription"
    >

    @if(errors.shortDescription){
      <p class="mt-1 text-sm text-red-600">
        {{errors.shortDescription}}
      </p>
    }
  </div>

  <div>
    <label for="project-description" class="mb-1 block text-sm font-medium text-gray-700">
      Beschreibung
    </label>

    <textarea
      id="project-description"
      rows="4"
      name="description"
      [(ngModel)]="formData.description"
      placeholder="Beschreibe dein Projekt ausführlich"
      class="w-full rounded-lg border px-3 py-2 outline-none"
      [class.border-red-500]="errors.description"
      [class.border-gray-300]="!errors.description"
      [class.focus:border-lime-500]="!errors.description"
    ></textarea>

    @if(errors.description){
      <p class="mt-1 text-sm text-red-600">
        {{errors.description}}
      </p>
    }
  </div>

  <div class="flex justify-end pt-4">
    <button
      type="button"
      (click)="submit()"
      class="rounded-lg bg-lime-500 px-5 py-2 text-sm font-medium text-white hover:bg-lime-600">
      Weiter
    </button>
  </div>

</form>

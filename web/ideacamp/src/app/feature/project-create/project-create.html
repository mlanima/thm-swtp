@if (errorMessage) {
  <div class="mx-auto max-w-4xl px-6 pt-6">
    <div class="rounded-xl bg-red-50 border border-red-200 p-4 text-red-700 text-sm">
      {{ errorMessage }}
    </div>
  </div>
}

@if (successMessage) {
  <div class="mx-auto max-w-4xl px-6 pt-6">
    <div class="rounded-xl bg-green-50 border border-green-200 p-4 text-green-700 text-sm">
      {{ successMessage }}
    </div>
  </div>
}

@if (isLoading) {
  <div class="flex items-center justify-center py-6">
    <p class="text-slate-500 text-sm">Projekt wird erstellt…</p>
  </div>
}
<app-wizard-layout>

  <div sidebar>
    <app-stepper [currentStep]="currentStep"></app-stepper>
  </div>

  @if (currentStep === 0) {
    <app-project-general-form
      [initialFormData]="projectData"
      (next)="saveGeneralFormAndContinue($event)">
    </app-project-general-form>
  }
  @if (currentStep === 1){
    <app-project-settings-form
      [initialFormData]="projectData"
      (back)="saveSettingsFormAndBack($event)"
      (next)="saveSettingsFormAndContinue($event)">
    </app-project-settings-form>
  }

  @if (currentStep === 2){
    <app-project-members-form
      (back)="previousStep()"
      (next)="nextStep()">
    </app-project-members-form>
  }

  @if (currentStep === 3) {
    <app-project-finish-form
      [projectData]="projectData"
      (back)="previousStep()"
      (finished)="finishProjectCreation()">
    </app-project-finish-form>
  }
</app-wizard-layout>

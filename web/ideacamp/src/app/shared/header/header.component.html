<header class="flex justify-center border-b border-gray-300 py-2">
  <div class="flex justify-between container items-center px-[15px]">

    <div class="flex flex-1 gap-4 items-center">
      @if (isAuthenticated()) {
        <button (click)="sidebarService.open()" class="-ml-2 p-2" aria-label="Menü öffnen">
          <i class="pi pi-bars text-xl text-slate-900"> </i>
        </button>
      }

      <app-logo/>
    </div>

    @if (isAuthenticated() && !isModerator()) {
      <nav class="hidden md:flex">
        <a routerLink="/my-projects">
          <app-feature>
            <i class="pi pi-home text-md"></i>
            {{ 'NAV.HOME' | translate }}
          </app-feature>
        </a>
        <a routerLink="/search">
          <app-feature>
            <i class="pi pi-search text-md"></i>
            {{ 'NAV.SEARCH' | translate }}
          </app-feature>
        </a>
      </nav>
    }

    <div class="flex justify-end flex-1">
      @if (isAuthenticated()) {
        @if (isModerator()) {
          <div class="flex items-center gap-3">
            <div class="flex flex-col items-end text-sm">
              <div class="font-semibold">{{ auth.username() }}</div>
              <span class="inline-flex items-center rounded-md bg-amber-100 px-2 py-0.5 text-[10px] font-semibold text-amber-700 leading-none">{{ 'SIDEBAR.MODERATOR' | translate }}</span>
            </div>
            <button
              type="button"
              (click)="auth.logout()"
              class="rounded-full p-2 text-slate-900 transition hover:bg-gray-100">
              <i class="pi pi-sign-out text-md"></i>
            </button>
          </div>
        } @else {
          <a [routerLink]="['/profiles', auth.username()]" class="hidden md:block">
            <app-auth-panel [user]="{ username: auth.username(), id: auth.user()?.id ?? '' }"/>
          </a>
        }
      } @else {
        <div class="flex gap-1 items-center">
          <button (click)="auth.login()" class="group flex gap-2 items-center border border-slate-900 px-4 py-2 rounded-xl text-sm font-medium text-slate-900 transition-all duration-300 ease-out hover:bg-primary hover:border-primary hover:shadow-lg hover:shadow-primary/25 hover:text-white">
            {{ 'NAV.LOGIN' | translate }}
            <i class="pi pi-sign-in text-xs transition-transform duration-300 ease-out group-hover:translate-x-1"></i>
          </button>
        </div>
      }
    </div>
  </div>

  <button
    type="button"
    class="rounded-lg border border-slate-300 px-3 py-1 text-sm font-medium text-slate-700 transition hover:bg-slate-100"
    (click)="changeLanguage(currentLanguage() === 'en' ? 'de' : 'en')">
    {{ currentLanguage() === 'en' ? 'EN' : 'DE' }}
  </button>


</header>

<div class="space-y-4">
  <div class="relative">
    <input
      #userSearchInput
      type="text"
      name="user-search"
      [ngModel]="searchQuery()"
      (ngModelChange)="searchUser($event)"
      [placeholder]="placeholder()"
      class="w-full rounded-lg border border-slate-300 px-3 py-2 pr-10 text-sm outline-none focus:border-lime-500"
    />

    @if (isSearching()) {
      <div class="absolute right-3 top-1/2 -translate-y-1/2">
        <div class="h-4 w-4 animate-spin rounded-full border-2 border-slate-300 border-t-slate-700"></div>
      </div>
    }
  </div>

  @if (searchResults().length > 0) {
    <div class="space-y-2">
      @for (user of searchResults(); track user.keycloakId) {
        <button
          type="button"
          (click)="selectUser(user)"
          class="flex w-full items-center gap-3 rounded-lg border border-slate-200 bg-slate-50 px-3 py-3 text-left hover:bg-slate-100"
        >
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-700 text-sm font-semibold text-white">
            {{ user.username.charAt(0).toUpperCase() }}
          </div>

          <div>
            <p class="text-sm font-semibold text-slate-800">
              {{ user.username }}
            </p>

            @if (user.title) {
              <p class="text-xs text-slate-500">
                {{ user.title }}
              </p>
            }
          </div>
        </button>
      }
    </div>
  }

  @if (hasSearched() && !isSearching() && searchQuery().trim().length >= 2 && searchResults().length === 0) {
    <div class="rounded-lg bg-slate-50 px-4 py-8 text-center">
      <p class="text-sm text-slate-500">
        {{ emptyMessage() }} "{{ searchQuery() }}"
      </p>
    </div>
  }
</div>

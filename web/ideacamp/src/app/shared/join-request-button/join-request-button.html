@if (status() !== 'loading' && allowJoinRequests) {
  <button
    (click)="send($event)"
    [disabled]="status() === 'pending'"
    [title]="status() === 'pending' ? 'Anfrage ausstehend' : 'Beitreten beantragen'"
    class="group flex items-center gap-1.5 rounded-full p-3 transition"
    [class]="status() === 'pending' ? 'cursor-default opacity-50' : (onDark ? 'hover:bg-white/20' : 'hover:bg-slate-100')"
  >
    <i
      class="pi pi-user-plus text-lg transition-colors"
      [class]="status() === 'pending' ? (onDark ? 'text-white' : 'text-slate-500') : (onDark ? 'text-white group-hover:text-blue-400' : 'text-slate-500 group-hover:text-blue-400')"
      style="-webkit-text-stroke: 0.5px"
    ></i>
  </button>
}

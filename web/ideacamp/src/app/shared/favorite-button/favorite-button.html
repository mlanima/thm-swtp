@if (!loading()) {
  <button
    (click)="toggle($event)"
    [title]="favorited() ? 'Aus Favoriten entfernen' : 'Zu Favoriten hinzufügen'"
    class="flex items-center gap-1.5 rounded-full p-2 transition hover:bg-white/20"
  >
    <i
      class="pi text-xl transition-colors"
      [class]="favorited() ? 'pi-heart-fill text-red-500' : 'pi-heart text-slate-400 hover:text-red-400'"
    ></i>
    @if (displayCount() !== null) {
      <span class="text-sm font-medium" [class]="favorited() ? 'text-red-500' : 'text-slate-400'">
        {{ displayCount() }}
      </span>
    }
  </button>
}

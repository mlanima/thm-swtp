name: CI Backend

on:
  pull_request:
    branches: [main, developer, feature/cicd-improvements-test]
    paths: ['api/**']

jobs:
  lint-backend:
    name: Checkstyle (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check --no-transfer-progress

  test-backend:
    name: Test (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw test --no-transfer-progress

  build-backend:
    name: Build (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: ./mvnw package -DskipTests --no-transfer-progress

name: Claude Code Review

on:
  pull_request:
    branches: [main, developer]
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            HEAD SHA: ${{ github.event.pull_request.head.sha }}

            Review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications
            - Consistency with the existing code style in this repo

            The PR branch is already checked out. Use `gh pr diff` / `gh pr view` to inspect it.

            Do NOT post any GitHub comments and do NOT create inline review comments.
            Instead, write your complete review as Markdown to a file named `review.md`
            in the repository root, using this structure:

              ## Review summary
              <1-3 sentence overview>

              ## Findings
              | Severity | Location | Issue |
              |---|---|---|
              | 🔴 / 🟡 / 🟣 | [`File.java:line`](https://github.com/<REPO>/blob/<HEAD_SHA>/<full/path>#L<line>) | <short description> |

              ## Notes
              - <optional further remarks>

            Use the HEAD SHA above to build stable blob permalinks to the exact lines
            (line ranges as `#L<start>-L<end>`).
            IMPORTANT: the visible link text in the Location column must be ONLY the
            file's base name plus line (e.g. `ProjectService.java:79-89`), never the
            full path — this keeps the table narrow and readable without wide-layout
            plugins. The full path belongs only inside the URL.
            If you find no issues, write a short `review.md` that says so.
            Write only the file — post nothing.

          claude_args: |
            --allowedTools "Write,Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*)"

      # Upsert a single sticky comment with the review: find the marker-tagged
      # comment and edit it in place, otherwise create it. No accumulation, no
      # inline review wrappers, nothing to purge.
      - name: Publish sticky review comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- claude-sticky-review -->"
          if [ ! -f review.md ]; then
            echo "No review.md produced — nothing to publish."
            exit 0
          fi
          BODY="$MARKER"$'\n'"$(cat review.md)"
          id=$(gh api --paginate "repos/$REPO/issues/$PR/comments" \
                 --jq ".[] | select(.user.login==\"github-actions[bot]\") | select(.body | contains(\"$MARKER\")) | .id" \
               | head -n1)
          if [ -n "$id" ]; then
            jq -n --arg b "$BODY" '{body:$b}' | gh api -X PATCH "repos/$REPO/issues/comments/$id" --input -
          else
            jq -n --arg b "$BODY" '{body:$b}' | gh api -X POST "repos/$REPO/issues/$PR/comments" --input -
          fi

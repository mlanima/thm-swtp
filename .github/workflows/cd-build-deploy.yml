name: CD Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, developer]

permissions:
  contents: read
  packages: write

jobs:
  namespace:
    name: Resolve GHCR namespace
    runs-on: ubuntu-latest
    outputs:
      namespace: ${{ steps.lower.outputs.namespace }}
    steps:
      - id: lower
        run: echo "namespace=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'api/**'
            frontend:
              - 'web/ideacamp/**'

  build-backend:
    name: Build & Push (Backend)
    needs: [namespace, detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ needs.namespace.outputs.namespace }}/swtp-api:latest
            ghcr.io/${{ needs.namespace.outputs.namespace }}/swtp-api:${{ github.run_number }}

  build-frontend:
    name: Build & Push (Frontend)
    needs: [namespace, detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: ./web/ideacamp
          push: true
          tags: |
            ghcr.io/${{ needs.namespace.outputs.namespace }}/swtp-web:latest
            ghcr.io/${{ needs.namespace.outputs.namespace }}/swtp-web:${{ github.run_number }}

  deploy:
    name: Deploy to Server
    needs: [namespace, build-backend, build-frontend]
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy target
        id: target
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "cmd=deploy-main" >> $GITHUB_OUTPUT ;;
            developer) echo "cmd=deploy-dev" >> $GITHUB_OUTPUT ;;
            *)
              echo "cd-build-deploy only runs on main/developer branches" >&2
              exit 1
              ;;
          esac

      - name: Trigger deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p 2105 tosch@mail.schalz.de \
            "${{ steps.target.outputs.cmd }}"

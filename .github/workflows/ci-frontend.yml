name: CI Frontend

on:
  pull_request:
    branches: [main, developer, feature/cicd-improvements-test]
    paths: ['web/ideacamp/**']

jobs:
  ci-frontend:
    name: CI (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ideacamp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/ideacamp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

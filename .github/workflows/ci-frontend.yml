name: CI Frontend

on:
  pull_request:
    branches: [main, developer]
    paths: ['web/ideacamp/**']

jobs:
  lint-frontend:
    name: ESLint (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ideacamp
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/ideacamp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test-frontend:
    name: Test (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ideacamp
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/ideacamp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-frontend:
    name: Build (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ideacamp
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/ideacamp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
